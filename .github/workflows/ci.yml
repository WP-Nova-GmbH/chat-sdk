name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Check types
              run: npm run check-types

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Verify package contents
              run: npm run pack:dry-run
