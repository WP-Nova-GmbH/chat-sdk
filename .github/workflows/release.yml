name: Release SDK

on:
    # The tag value is only a release signal. The set of packages actually
    # published is whatever has a manifest version not yet on the registry, so
    # linked (non-lockstep) bumps — e.g. an Angular-only patch — release cleanly.
    push:
        tags:
            - "sdk-*"
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
                  cache: npm

            - name: Upgrade npm (Trusted Publishing requires npm >= 11.5.1)
              run: npm install -g npm@latest

            - name: Install dependencies
              run: npm ci

            - name: Validate release
              run: |
                  npm run build
                  npm run check-types
                  npm run lint
                  npm test
                  npm run pack:dry-run
                  npm run check-angular-publishable

            - name: Publish npm packages
              id: publish
              run: node scripts/publish-packages.mjs

            - name: Stage CDN artifacts
              id: stage
              if: steps.publish.outputs.published_core == 'true'
              run: |
                  VERSION="${{ steps.publish.outputs.core_version }}"
                  SRC="packages/chat-sdk/dist/index.global.js"
                  SRI="packages/chat-sdk/dist/index.global.js.sri"
                  STAGE="cdn-upload"
                  rm -rf "$STAGE"
                  mkdir -p "$STAGE/sdk/$VERSION" "$STAGE/sdk/v1"
                  cp "$SRC" "$STAGE/sdk/$VERSION/sdk.js"
                  cp "$SRC" "$STAGE/sdk/v1/sdk.js"
                  cp "$SRI" "$STAGE/sdk/$VERSION/sdk.js.sri"
                  INTEGRITY="$(cat "$SRI")"
                  echo "integrity=$INTEGRITY" >> "$GITHUB_OUTPUT"
                  echo "Immutable URL: https://chat.wp-nova.ai/sdk/$VERSION/sdk.js"
                  echo "  integrity:   $INTEGRITY"
                  echo "Rolling URL:   https://chat.wp-nova.ai/sdk/v1/sdk.js (no SRI)"

            - name: Upload CDN artifact
              if: steps.publish.outputs.published_core == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: sdk-${{ steps.publish.outputs.core_version }}-cdn
                  path: cdn-upload/
                  retention-days: 30
